# Chromebook-optimized Hypridle configuration thus there is a bug on my sleep system, the standart way isn't working
general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    # after_sleep_cmd = /usr/local/bin/chromebook-wakeup
}

listener {
    timeout = 150                                # 2.5min
    on-timeout = pidof Hyprland && brightnessctl -s set 10         # set monitor backlight to minimum (only if Hyprland is running)
    on-resume = pidof Hyprland && brightnessctl -r                 # monitor backlight restore
}

listener {
    timeout = 400                                # 5min
    on-timeout = hyprlock                        # lock screen when timeout has passed
}

#listener {
#    timeout = 630                                # 5.5min
#    on-timeout = hyprctl dispatch dpms off       # screen off when timeout has passed
#    on-resume = hyprctl dispatch dpms on && brightnessctl -r
#}

listener {
    timeout = 3600                               # 60min
    on-timeout = shutdown now               #shutdown the system because idling does not work on chromebooke
